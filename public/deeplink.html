<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening SwifterX…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 380px;
    }
    .logo { font-size: 28px; font-weight: 800; margin-bottom: 32px; }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p  { font-size: 15px; color: #888; margin-bottom: 28px; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: #fff;
      color: #000;
      padding: 14px 32px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }
    .btn:hover { opacity: .88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">SwifterX</div>
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Opening SwifterX…</h1>
    <p id="desc">If the app doesn't open automatically, tap below to download it.</p>
    <a id="cta"
       class="btn"
       href="https://apps.apple.com/app/swifterx/id0000000000">
      Download on the App Store
    </a>
  </div>

  <script>
    // Parse the current path to build a custom URL scheme deep link.
    // Universal Links open the app directly; this page handles web fallback only.
    const path     = window.location.pathname;           // e.g. /order/abc123
    const segments = path.split("/").filter(Boolean);    // ["order","abc123"]
    const scheme   = "swifterx://";

    const appStoreURL = "https://apps.apple.com/app/swifterx/id0000000000";

    function tryOpenApp() {
      if (segments.length < 2) return;
      const deepLink = scheme + segments[0] + "/" + segments[1];
      window.location.href = deepLink;
    }

    // Attempt to open the app after a short delay; redirect to App Store if
    // the page is still visible after 2.5 s (app not installed).
    tryOpenApp();

    const redirectTimer = setTimeout(() => {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("title").textContent = "Get SwifterX";
      document.getElementById("desc").textContent =
        "Install SwifterX to view this content.";
    }, 2500);

    // If the page is hidden (app opened), cancel the timer.
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) clearTimeout(redirectTimer);
    });
  </script>
</body>
</html>
