<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — SwifterX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .code  { font-size: 80px; font-weight: 800; color: #222; line-height: 1; margin-bottom: 20px; }
    h1     { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p      { font-size: 15px; color: #888; margin-bottom: 32px; }
    .btn   { display: inline-block; background: #fff; color: #000; padding: 12px 28px; border-radius: 100px; font-size: 14px; font-weight: 700; text-decoration: none; }
    .btn:hover { opacity: .88; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a class="btn" href="/">Back to Home</a>
  </div>
</body>
</html>
