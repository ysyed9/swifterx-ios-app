name: Deploy Firebase Hosting

# Runs on every push to main (production deploy) and on pull requests (preview channel).
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── Production deploy (main branch only) ──────────────────────────────────
  deploy_production:
    name: Deploy to swifterx.app
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: firebase/functions/package.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Install Cloud Functions dependencies
        run: npm ci
        working-directory: firebase/functions

      - name: Deploy Hosting + Functions + Firestore + Storage rules
        run: |
          firebase deploy \
            --project swifterx-e7f15 \
            --only hosting,functions,firestore:rules,firestore:indexes,storage \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # ─── Preview channel deploy (pull requests) ─────────────────────────────────
  deploy_preview:
    name: Preview Deploy (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Deploy Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:       '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SWIFTERX }}'
          projectId:       swifterx-e7f15
          channelId:       live
          target:          hosting
