name: Ruby bundle audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bundler-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install gems and audit
        run: |
          bundle install
          bundle exec bundle-audit check --update
